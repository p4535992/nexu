# NexU runtime configuration
#
# Values can be overridden by an external nexu-config.properties file.

binding_ip=127.0.0.1
binding_ports=9795
nexu_hostname=127.0.0.1

plugin_rest=lu.nowina.nexu.rest.RestHttpPlugin
plugin_keystore=lu.nowina.nexu.keystore.KeystorePlugin
plugin_windows_keystore=lu.nowina.nexu.windows.keystore.WindowsKeystorePlugin

http_server_class=lu.nowina.nexu.springboot.server.SpringBootHttpServer

# Wildcard access is retained only for the legacy /rest API. Browser calls to
# /v1 require an explicit origin allowlist in the external configuration, for
# example: cors_allowed_origin=https://sign.example.org
cors_allowed_origin=*

close_token=true
cache_time_to_live_ms=10000
make_single_card_default=true
filter_only_cert_with_digital_signature_usage_bit=true

# Diagnostic file logging is handled by the Logback implementation supplied by
# Spring Boot. The default directory is the NexU user-data directory under
# "logs". Override it with log_directory, -Dnexu.log.dir or NEXU_LOG_DIR.
log_directory=
log_level=DEBUG
rolling_log_file_size=10MB
rolling_log_file_number=14
rolling_log_total_size_cap=200MB

debug=false
send_anonymous_info_to_proxy=false
enable_incident_report=false
enable_informative_pop_ups=false
display_back_button=true

server_url=
installUrl=
ticket_url=https://github.com/p4535992/nexu/issues/new
