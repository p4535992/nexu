name: Diagnose Windows build

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/windows-build-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Capture concise Maven result
        id: maven
        shell: pwsh
        run: |
          $output = & mvn --batch-mode --errors -pl nexu-app -am -Dmaven.test.skip=true package 2>&1
          $status = $LASTEXITCODE
          $output | Set-Content -Path windows-build.log -Encoding utf8
          $tail = ($output | Select-Object -Last 140) -join "`n"

          New-Item -ItemType Directory -Path .github/release-status -Force | Out-Null
          @(
            '# Windows build diagnostic'
            ''
            "- Source commit: ``$env:GITHUB_SHA``"
            "- Workflow run: ``$env:GITHUB_RUN_ID``"
            "- Maven exit code: ``$status``"
            ''
            '```text'
            $tail
            '```'
          ) | Set-Content -Path .github/release-status/windows-build.md -Encoding utf8

          "exit_code=$status" >> $env:GITHUB_OUTPUT

      - name: Commit diagnostic
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/release-status/windows-build.md
          git commit -m "Record Windows build diagnostic $env:GITHUB_RUN_ID"
          git push origin HEAD:master
