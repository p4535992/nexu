name: DSS 6.4 migration

on:
  pull_request:
    paths:
      - 'pom.xml'
      - '.github/scripts/upgrade-dss-64.py'
      - '.github/workflows/dss-64-migration.yml'
      - 'docs/adr/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-version-upgrade:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/dss-6.4-architecture
          fetch-depth: 1

      - name: Update managed DSS version
        run: python3 .github/scripts/upgrade-dss-64.py

      - name: Commit version upgrade
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pom.xml
          if git diff --cached --quiet; then
            echo 'DSS version already updated'
            exit 0
          fi
          git commit -m 'Upgrade DSS to 6.4'
          git push origin HEAD:agent/dss-6.4-architecture
