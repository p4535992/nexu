name: Fix and verify two-module build

on:
  push:
    branches:
      - spring-boot-modernization-2
    paths:
      - '.github/workflows/fix-and-verify-two-module-build.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spring-boot-modernization-2
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Use source and target with JDK exports
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for name in ('nexu-core/pom.xml', 'nexu-app/pom.xml'):
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              old = '<release>17</release>'
              new = '<source>17</source>\n                    <target>17</target>'
              if old not in text:
                  raise SystemExit(f'{old} not found in {name}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Compile and test
        id: build
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors clean package -Dmaven.test.skip=true > two-module-build.log 2>&1
          build_status=$?
          test_status=99
          if [ "$build_status" -eq 0 ]; then
            mvn --batch-mode --errors -pl nexu-app -am test > two-module-test.log 2>&1
            test_status=$?
          else
            echo 'Tests not run because compilation failed.' > two-module-test.log
          fi

          {
            echo "build_status=$build_status"
            echo "test_status=$test_status"
            echo
            echo '=== build log tail ==='
            tail -n 260 two-module-build.log
            echo
            echo '=== test log tail ==='
            tail -n 260 two-module-test.log
          } > docs/ci/two-module-verification.txt

          echo "build_status=$build_status" >> "$GITHUB_OUTPUT"
          echo "test_status=$test_status" >> "$GITHUB_OUTPUT"

      - name: Persist fix and result
        if: always()
        shell: bash
        run: |
          rm .github/workflows/fix-and-verify-two-module-build.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A nexu-core/pom.xml nexu-app/pom.xml docs/ci/two-module-verification.txt .github/workflows/fix-and-verify-two-module-build.yml
          git commit -m 'Fix Java 17 compiler flags in consolidated modules'
          git push origin HEAD:spring-boot-modernization-2

      - name: Fail when verification failed
        if: always()
        shell: bash
        run: |
          test '${{ steps.build.outputs.build_status }}' = '0'
          test '${{ steps.build.outputs.test_status }}' = '0'
