name: Package modern NexU

on:
  pull_request:
    paths:
      - 'pom.xml'
      - 'pom-modernization.xml'
      - 'nexu-*/**'
      - 'LICENSE'
      - 'THIRD_PARTY_NOTICES.md'
      - 'licenses/**'
      - '.github/workflows/package-modern-nexu.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-portable:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 11 and Java 17 toolchains
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            11
            17
          mvn-toolchain-id: |
            temurin_11
            temurin_17
          cache: maven

      - name: Install legacy parent POM
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors -N -f pom.xml \
            -Dmaven.test.skip=true install > linux-parent.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then tail -n 160 linux-parent.log; fi
          exit "$status"

      - name: Build Linux application
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors -f pom-modernization.xml \
            -pl nexu-modern-app -am \
            -Dmaven.test.skip=true package > linux-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then tail -n 200 linux-build.log; fi
          exit "$status"

      - name: Verify Linux JavaFX runtime
        shell: bash
        run: |
          JAR=nexu-modern-app/target/nexu-modern.jar
          jar tf "$JAR" | grep -q 'BOOT-INF/lib/javafx-graphics-11.0.2-linux.jar'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/javafx-graphics-11.0.2-win.jar'

      - name: Build Linux portable application image
        shell: bash
        run: |
          bash nexu-modern-app/src/jpackage/package-linux.sh \
            nexu-modern-app/target/nexu-modern.jar \
            nexu-modern-app/target/jpackage \
            1.24.0

      - name: Smoke test packaged application
        shell: bash
        run: |
          CONFIG=nexu-modern-app/target/jpackage/NexU/nexu-config.properties
          sed -i 's/binding_ports=9795/binding_ports=19795/' "$CONFIG"
          sed -i 's#cors_allowed_origin=\*#cors_allowed_origin=http://localhost:8080#' "$CONFIG"

          if ! command -v xvfb-run >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xvfb
          fi

          LOG=nexu-modern-app/target/jpackage/nexu-smoke.log
          STATUS_FILE=nexu-modern-app/target/jpackage/status.json
          CLIENT_FILE=nexu-modern-app/target/jpackage/nexu-v2.js
          xvfb-run -a nexu-modern-app/target/jpackage/NexU/bin/NexU >"$LOG" 2>&1 &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true; pkill -f "target/jpackage/NexU" 2>/dev/null || true' EXIT

          started=false
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:19795/v1/status > "$STATUS_FILE"; then
              started=true
              break
            fi
            if ! kill -0 "$PID" 2>/dev/null; then
              break
            fi
            sleep 1
          done

          if [ "$started" != true ]; then
            cat "$LOG"
            exit 1
          fi

          grep -q '"protocol":"nexu:2.0"' "$STATUS_FILE"
          grep -q 'Loaded external NexU properties' "$LOG"
          curl --fail --silent --show-error \
            http://127.0.0.1:19795/nexu-v2.js > "$CLIENT_FILE"
          grep -q 'getSigningCertificate' "$CLIENT_FILE"

      - name: Upload Linux package and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexu-modern-linux-portable
          path: |
            nexu-modern-app/target/jpackage/*.tar.gz
            nexu-modern-app/target/jpackage/status.json
            nexu-modern-app/target/jpackage/nexu-v2.js
            nexu-modern-app/target/jpackage/nexu-smoke.log
            linux-parent.log
            linux-build.log
          if-no-files-found: warn
          retention-days: 7

  windows-portable-and-exe:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 11 and Java 17 toolchains
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            11
            17
          mvn-toolchain-id: |
            temurin_11
            temurin_17
          cache: maven

      - name: Install legacy parent POM
        shell: cmd
        run: |
          mvn --batch-mode --errors -N -f pom.xml -Dmaven.test.skip=true install > windows-parent.log 2>&1
          if errorlevel 1 (type windows-parent.log & exit /b 1)

      - name: Build Windows application
        shell: cmd
        run: |
          mvn --batch-mode --errors -f pom-modernization.xml -pl nexu-modern-app -am -Dmaven.test.skip=true package > windows-build.log 2>&1
          if errorlevel 1 (type windows-build.log & exit /b 1)

      - name: Verify Windows JavaFX runtime
        shell: pwsh
        run: |
          $entries = & jar tf nexu-modern-app/target/nexu-modern.jar
          if (-not ($entries -match 'BOOT-INF/lib/javafx-graphics-11.0.2-win.jar')) {
            throw 'Windows JavaFX native JAR is missing'
          }
          if ($entries -match 'BOOT-INF/lib/javafx-graphics-11.0.2-linux.jar') {
            throw 'Linux JavaFX native JAR leaked into Windows package'
          }

      - name: Ensure WiX Toolset is available
        shell: pwsh
        run: |
          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          if (-not $candle) {
            choco install wixtoolset --yes --no-progress
            $programFilesX86 = [Environment]::GetFolderPath('ProgramFilesX86')
            $wixPattern = Join-Path $programFilesX86 'WiX Toolset v3.*\bin'
            $wixBin = Get-ChildItem -Path $wixPattern -Directory `
              -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $wixBin) {
              throw 'WiX Toolset installation directory was not found'
            }
            $wixBin.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Build Windows portable package and EXE installer
        shell: pwsh
        run: |
          ./nexu-modern-app/src/jpackage/package-windows.ps1 `
            -JarPath nexu-modern-app/target/nexu-modern.jar `
            -Destination nexu-modern-app/target/jpackage `
            -AppVersion 1.24.0

      - name: Verify Windows packages
        shell: pwsh
        run: |
          $zip = Get-ChildItem nexu-modern-app/target/jpackage -Filter '*-portable.zip'
          $exe = Get-ChildItem nexu-modern-app/target/jpackage -Filter '*.exe'
          if (-not $zip) { throw 'Portable ZIP was not generated' }
          if (-not $exe) { throw 'EXE installer was not generated' }
          if (-not (Test-Path nexu-modern-app/target/jpackage/NexU/nexu-config.properties)) {
            throw 'External configuration template is missing from the app image'
          }
          if (-not (Test-Path nexu-modern-app/target/jpackage/NexU/THIRD_PARTY_NOTICES.md)) {
            throw 'Third-party notices are missing from the app image'
          }

      - name: Upload Windows packages and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexu-modern-windows-packages
          path: |
            nexu-modern-app/target/jpackage/*-portable.zip
            nexu-modern-app/target/jpackage/*.exe
            windows-parent.log
            windows-build.log
          if-no-files-found: warn
          retention-days: 7
