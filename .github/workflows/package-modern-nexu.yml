name: Package NexU

on:
  push:
    branches:
      - spring-boot-modernization-2
  pull_request:
    paths:
      - 'pom.xml'
      - 'nexu-core/**'
      - 'nexu-app/**'
      - 'nexu-api/**'
      - 'nexu-model/**'
      - 'nexu-util/**'
      - 'nexu-standalone/**'
      - 'nexu-spring-boot-server/**'
      - 'nexu-windows-keystore-plugin/**'
      - 'LICENSE'
      - 'THIRD_PARTY_NOTICES.md'
      - 'licenses/**'
      - '.github/workflows/package-modern-nexu.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Linux packaging, PCSC and display runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fakeroot libpcsclite1 pcscd xvfb

      - name: Build Linux application
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors \
            -pl nexu-app -am \
            -Dmaven.test.skip=true package > linux-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then tail -n 240 linux-build.log; fi
          exit "$status"

      - name: Verify Linux JavaFX 21 runtime
        shell: bash
        run: |
          JAR=nexu-app/target/nexu-app.jar
          jar tf "$JAR" | grep -q 'BOOT-INF/lib/javafx-graphics-21.0.11-linux.jar'
          jar tf "$JAR" | grep -q 'BOOT-INF/lib/javafx-controls-21.0.11-linux.jar'
          jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-core-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-.*-plugin-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-standalone-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/javafx-.*-11.0.2'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/javafx-graphics-21.0.11-win.jar'

      - name: Build Linux portable and Debian packages
        run: |
          bash nexu-app/src/jpackage/package-linux.sh \
            nexu-app/target/nexu-app.jar \
            nexu-app/target/jpackage \
            1.24.0

      - name: Verify Linux packages
        shell: bash
        run: |
          test -x nexu-app/target/jpackage/NexU/bin/NexU
          test -f nexu-app/target/jpackage/NexU/nexu-config.properties
          test -f nexu-app/target/jpackage/NexU/THIRD_PARTY_NOTICES.md
          DEB=$(find nexu-app/target/jpackage -maxdepth 1 -type f -name '*.deb' -print -quit)
          test -n "$DEB"
          dpkg-deb --info "$DEB" | tee nexu-app/target/jpackage/deb-info.txt
          dpkg-deb --contents "$DEB" | grep -q '/opt/nexu/'

      - name: Smoke test packaged application
        shell: bash
        run: |
          CONFIG=nexu-app/target/jpackage/NexU/nexu-config.properties
          sed -i 's/binding_ports=9795/binding_ports=19795/' "$CONFIG"
          sed -i 's#cors_allowed_origin=\*#cors_allowed_origin=http://localhost:8080#' "$CONFIG"

          LOG=nexu-app/target/jpackage/nexu-smoke.log
          STATUS_FILE=nexu-app/target/jpackage/status.json
          CLIENT_FILE=nexu-app/target/jpackage/nexu-v2.js
          xvfb-run -a nexu-app/target/jpackage/NexU/bin/NexU >"$LOG" 2>&1 &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true; pkill -f "target/jpackage/NexU" 2>/dev/null || true' EXIT

          started=false
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:19795/v1/status > "$STATUS_FILE"; then
              started=true
              break
            fi
            if ! kill -0 "$PID" 2>/dev/null; then break; fi
            sleep 1
          done

          if [ "$started" != true ]; then
            cat "$LOG"
            exit 1
          fi

          grep -q '"protocol":"nexu:2.0"' "$STATUS_FILE"
          grep -q 'Loaded external NexU properties' "$LOG"
          curl --fail --silent --show-error \
            http://127.0.0.1:19795/nexu-v2.js > "$CLIENT_FILE"
          grep -q 'getSigningCertificate' "$CLIENT_FILE"

      - name: Upload Linux packages and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexu-linux-packages
          path: |
            nexu-app/target/jpackage/*.tar.gz
            nexu-app/target/jpackage/*.deb
            nexu-app/target/jpackage/deb-info.txt
            nexu-app/target/jpackage/status.json
            nexu-app/target/jpackage/nexu-v2.js
            nexu-app/target/jpackage/nexu-smoke.log
            linux-build.log
          if-no-files-found: warn
          retention-days: 7

  windows-portable-and-exe:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Windows application
        shell: cmd
        run: |
          mvn --batch-mode --errors -pl nexu-app -am -Dmaven.test.skip=true package > windows-build.log 2>&1
          if errorlevel 1 (type windows-build.log & exit /b 1)

      - name: Verify Windows JavaFX 21 runtime
        shell: pwsh
        run: |
          $entries = & jar tf nexu-app/target/nexu-app.jar
          if (-not ($entries -match 'BOOT-INF/lib/javafx-graphics-21.0.11-win.jar')) {
            throw 'Windows JavaFX 21 native JAR is missing'
          }
          if (-not ($entries -match 'BOOT-INF/lib/javafx-controls-21.0.11-win.jar')) {
            throw 'Windows JavaFX 21 controls JAR is missing'
          }
          if (-not ($entries -match 'BOOT-INF/lib/nexu-core-')) {
            throw 'Consolidated nexu-core JAR is missing'
          }
          if ($entries -match 'BOOT-INF/lib/nexu-.*-plugin-') {
            throw 'A retired plugin module leaked into the Windows package'
          }
          if ($entries -match 'BOOT-INF/lib/nexu-standalone-') {
            throw 'The retired standalone module leaked into the Windows package'
          }
          if ($entries -match 'BOOT-INF/lib/javafx-.*-11.0.2') {
            throw 'Obsolete JavaFX 11 runtime leaked into the Windows package'
          }
          if ($entries -match 'BOOT-INF/lib/javafx-graphics-21.0.11-linux.jar') {
            throw 'Linux JavaFX native JAR leaked into Windows package'
          }

      - name: Ensure WiX Toolset is available
        shell: pwsh
        run: |
          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          if (-not $candle) {
            choco install wixtoolset --yes --no-progress
            $programFilesX86 = [Environment]::GetFolderPath('ProgramFilesX86')
            $wixPattern = Join-Path $programFilesX86 'WiX Toolset v3.*\bin'
            $wixBin = Get-ChildItem -Path $wixPattern -Directory `
              -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $wixBin) { throw 'WiX Toolset installation directory was not found' }
            $wixBin.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Build Windows portable package and EXE installer
        shell: pwsh
        run: |
          ./nexu-app/src/jpackage/package-windows.ps1 `
            -JarPath nexu-app/target/nexu-app.jar `
            -Destination nexu-app/target/jpackage `
            -AppVersion 1.24.0

      - name: Verify Windows packages
        shell: pwsh
        run: |
          $zip = Get-ChildItem nexu-app/target/jpackage -Filter '*-portable.zip'
          $exe = Get-ChildItem nexu-app/target/jpackage -Filter '*.exe'
          if (-not $zip) { throw 'Portable ZIP was not generated' }
          if (-not $exe) { throw 'EXE installer was not generated' }
          if (-not (Test-Path nexu-app/target/jpackage/NexU/NexU.exe)) {
            throw 'Operator launcher NexU.exe is missing from the app image'
          }
          if (-not (Test-Path nexu-app/target/jpackage/NexU/nexu-config.properties)) {
            throw 'External configuration template is missing from the app image'
          }
          if (-not (Test-Path nexu-app/target/jpackage/NexU/THIRD_PARTY_NOTICES.md)) {
            throw 'Third-party notices are missing from the app image'
          }

      - name: Upload Windows packages and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexu-windows-packages
          path: |
            nexu-app/target/jpackage/*-portable.zip
            nexu-app/target/jpackage/*.exe
            windows-build.log
          if-no-files-found: warn
          retention-days: 7
