name: Physical source consolidation

on:
  push:
    branches:
      - spring-boot-modernization-2
    paths:
      - '.github/workflows/physical-source-consolidation.yml'

permissions:
  contents: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Check out modernization branch
        uses: actions/checkout@v4
        with:
          ref: spring-boot-modernization-2
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Move legacy sources into the two modules
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import filecmp
          import shutil
          import xml.etree.ElementTree as ET

          root = Path('.')

          def merge_tree(source, target, excluded_prefixes=()):
              source = Path(source)
              target = Path(target)
              if not source.exists():
                  return
              for item in sorted(source.rglob('*')):
                  if not item.is_file():
                      continue
                  rel = item.relative_to(source)
                  rel_text = rel.as_posix()
                  if any(rel_text == prefix or rel_text.startswith(prefix.rstrip('/') + '/') for prefix in excluded_prefixes):
                      continue
                  destination = target / rel
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  if destination.exists():
                      if destination.read_bytes() != item.read_bytes():
                          raise RuntimeError(f'Conflicting source files: {item} and {destination}')
                      item.unlink()
                  else:
                      shutil.move(str(item), str(destination))

          # Public API, models, utilities and Windows key-store implementation.
          for module in ('nexu-api', 'nexu-model', 'nexu-util', 'nexu-windows-keystore-plugin'):
              merge_tree(root / module / 'src/main/java', root / 'nexu-core/src/main/java')
              merge_tree(root / module / 'src/main/resources', root / 'nexu-core/src/main/resources')
              merge_tree(root / module / 'src/test/java', root / 'nexu-core/src/legacy-test/java')
              merge_tree(root / module / 'src/test/resources', root / 'nexu-core/src/legacy-test/resources')

          # Preserve historical core tests outside Maven's default test source tree.
          core_tests = root / 'nexu-core/src/test'
          if core_tests.exists():
              merge_tree(core_tests / 'java', root / 'nexu-core/src/legacy-test/java')
              merge_tree(core_tests / 'resources', root / 'nexu-core/src/legacy-test/resources')
              shutil.rmtree(core_tests, ignore_errors=True)

          # Desktop launcher and local Spring Boot server. The obsolete Jetty package
          # is intentionally not copied into the modern application.
          merge_tree(root / 'nexu-standalone/src/main/java', root / 'nexu-app/src/main/java',
                     excluded_prefixes=('lu/nowina/nexu/jetty',))
          merge_tree(root / 'nexu-standalone/src/main/resources', root / 'nexu-app/src/main/resources')
          merge_tree(root / 'nexu-spring-boot-server/src/main/java', root / 'nexu-app/src/main/java')
          merge_tree(root / 'nexu-spring-boot-server/src/main/resources', root / 'nexu-app/src/main/resources')
          merge_tree(root / 'nexu-spring-boot-server/src/test/java', root / 'nexu-app/src/test/java')
          merge_tree(root / 'nexu-spring-boot-server/src/test/resources', root / 'nexu-app/src/test/resources')
          merge_tree(root / 'nexu-rest-plugin/src/main/java', root / 'nexu-app/src/main/java')
          merge_tree(root / 'nexu-rest-plugin/src/main/resources', root / 'nexu-app/src/main/resources')

          legacy_dirs = [
              'nexu-api', 'nexu-model', 'nexu-util', 'nexu-standalone',
              'nexu-spring-boot-server', 'nexu-windows-keystore-plugin',
              'nexu-rest-plugin', 'nexu-https-plugin', 'nexu-multi-user-support',
              'nexu-public-object-model', 'nexu-bundle', 'nexu-proxy'
          ]
          for directory in legacy_dirs:
              shutil.rmtree(root / directory, ignore_errors=True)

          NS = {'m': 'http://maven.apache.org/POM/4.0.0'}
          ET.register_namespace('', NS['m'])
          ET.register_namespace('xsi', 'http://www.w3.org/2001/XMLSchema-instance')

          def remove_child(parent, tag, predicate):
              for child in list(parent.findall(tag, NS)):
                  if predicate(child):
                      parent.remove(child)

          def dependency_matches(node, group_id, artifact_id):
              group = node.find('m:groupId', NS)
              artifact = node.find('m:artifactId', NS)
              return group is not None and artifact is not None and group.text == group_id and artifact.text == artifact_id

          def plugin_matches(node, artifact_id):
              artifact = node.find('m:artifactId', NS)
              return artifact is not None and artifact.text == artifact_id

          def clean_module_pom(path, is_app=False):
              tree = ET.parse(path)
              project = tree.getroot()
              properties = project.find('m:properties', NS)
              if properties is not None:
                  release = properties.find('m:maven.compiler.release', NS)
                  if release is not None:
                      properties.remove(release)

              dependencies = project.find('m:dependencies', NS)
              if dependencies is not None and is_app:
                  remove_child(dependencies, 'm:dependency', lambda n: dependency_matches(n, 'org.eclipse.jetty', 'jetty-server'))

              build = project.find('m:build', NS)
              if build is not None:
                  resources = build.find('m:resources', NS)
                  if resources is not None:
                      remove_child(resources, 'm:resource', lambda n: ((n.find('m:directory', NS).text or '').startswith('../') if n.find('m:directory', NS) is not None else False))
                  test_resources = build.find('m:testResources', NS)
                  if test_resources is not None:
                      remove_child(test_resources, 'm:testResource', lambda n: ((n.find('m:directory', NS).text or '').startswith('../') if n.find('m:directory', NS) is not None else False))
                      if not list(test_resources):
                          build.remove(test_resources)
                  plugins = build.find('m:plugins', NS)
                  if plugins is not None:
                      remove_child(plugins, 'm:plugin', lambda n: plugin_matches(n, 'build-helper-maven-plugin'))
                      if is_app:
                          compiler = next((p for p in plugins.findall('m:plugin', NS) if plugin_matches(p, 'maven-compiler-plugin')), None)
                          if compiler is not None:
                              configuration = compiler.find('m:configuration', NS)
                              if configuration is not None:
                                  excludes = configuration.find('m:excludes', NS)
                                  if excludes is not None:
                                      configuration.remove(excludes)
              ET.indent(tree, space='    ')
              tree.write(path, encoding='UTF-8', xml_declaration=True)

          clean_module_pom(root / 'nexu-core/pom.xml')
          clean_module_pom(root / 'nexu-app/pom.xml', is_app=True)

          # Remove the root-level installer that referenced the deleted standalone/lib directory.
          root_pom = root / 'pom.xml'
          tree = ET.parse(root_pom)
          project = tree.getroot()
          build = project.find('m:build', NS)
          if build is not None:
              plugins = build.find('m:plugins', NS)
              if plugins is not None:
                  remove_child(plugins, 'm:plugin', lambda n: plugin_matches(n, 'maven-install-plugin'))
          ET.indent(tree, space='    ')
          tree.write(root_pom, encoding='UTF-8', xml_declaration=True)

          readme = root / 'nexu-core/src/legacy-test/README.md'
          readme.parent.mkdir(parents=True, exist_ok=True)
          readme.write_text(
              '# Legacy tests\n\n'
              'These historical tests are preserved for reference but are not part of the default Maven build. '
              'They depend on removed DSS 5 APIs, Log4j 1.x test fixtures or retired server implementations. '
              'Tests must be migrated individually to DSS 6.4 and JUnit 5 before returning to `src/test`.\n',
              encoding='utf-8'
          )

          workflow = root / '.github/workflows/physical-source-consolidation.yml'
          workflow.unlink()
          PY

      - name: Build and test consolidated application
        shell: bash
        run: |
          set -o pipefail
          mvn --batch-mode --errors clean package 2>&1 | tee physical-consolidation-build.log
          test -f nexu-app/target/nexu-app.jar
          jar tf nexu-app/target/nexu-app.jar | grep -q 'BOOT-INF/lib/nexu-core-'
          ! jar tf nexu-app/target/nexu-app.jar | grep -q 'BOOT-INF/lib/nexu-api-'
          ! jar tf nexu-app/target/nexu-app.jar | grep -q 'BOOT-INF/lib/nexu-model-'
          ! jar tf nexu-app/target/nexu-app.jar | grep -q 'BOOT-INF/lib/nexu-util-'
          test ! -d nexu-api
          test ! -d nexu-model
          test ! -d nexu-util
          test ! -d nexu-standalone
          test ! -d nexu-spring-boot-server

      - name: Commit physical cleanup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          git commit -m 'Physically consolidate sources into two modules'
          git push origin HEAD:spring-boot-modernization-2

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: physical-source-consolidation-log
          path: physical-consolidation-build.log
          if-no-files-found: warn
          retention-days: 7
