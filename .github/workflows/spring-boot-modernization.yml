name: Build NexU

on:
  push:
    branches:
      - spring-boot-modernization-2
  pull_request:
    paths:
      - 'pom.xml'
      - 'nexu-core/**'
      - 'nexu-app/**'
      - 'README.md'
      - 'docs/**'
      - '.github/workflows/spring-boot-modernization.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nexu-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test the two-module reactor
        shell: bash
        run: |
          set -o pipefail
          mvn --batch-mode --errors clean verify 2>&1 | tee maven-verify.log

      - name: Verify the headless core boundary
        shell: bash
        run: |
          if grep -RInE '(^|[[:space:]])import[[:space:]]+javafx\.|javafx\.' \
              nexu-core/src/main/java --include='*.java'; then
            echo 'JavaFX source reference found in nexu-core'
            exit 1
          fi

          mvn --batch-mode -pl nexu-core dependency:tree \
            > nexu-core-dependencies.log 2>&1

          if grep -Eq 'org\.openjfx|org\.springframework|org\.eclipse\.jetty|jakarta\.servlet|javax\.servlet' \
              nexu-core-dependencies.log; then
            cat nexu-core-dependencies.log
            echo 'Desktop or server dependency found in nexu-core'
            exit 1
          fi

      - name: Verify executable application
        shell: bash
        run: |
          JAR=nexu-app/target/nexu-app.jar
          test -f "$JAR"
          unzip -p "$JAR" META-INF/MANIFEST.MF | tee nexu-app-manifest.txt
          grep -q 'Start-Class: lu.nowina.nexu.NexuLauncher' nexu-app-manifest.txt
          jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-core-'
          jar tf "$JAR" | grep -q 'BOOT-INF/classes/nexu-config.properties'
          jar tf "$JAR" | grep -q 'BOOT-INF/lib/javafx-graphics-21.0.11-linux.jar'
          jar tf "$JAR" | grep -q 'BOOT-INF/lib/javafx-controls-21.0.11-linux.jar'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-api-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-model-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-util-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-standalone-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-spring-boot-server-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-windows-keystore-plugin-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/javafx-.*-11.0.2'

      - name: Upload executable application
        uses: actions/upload-artifact@v4
        with:
          name: nexu-application
          path: nexu-app/target/nexu-app.jar
          if-no-files-found: error
          retention-days: 7

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexu-build-logs
          path: |
            maven-verify.log
            nexu-core-dependencies.log
            nexu-app-manifest.txt
          if-no-files-found: warn
          retention-days: 7
