name: Inventory NexU core UI dependencies

on:
  push:
    branches:
      - spring-boot-modernization-2
    paths:
      - '.github/workflows/spring-boot-modernization.yml'

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: spring-boot-modernization-2
          fetch-depth: 2

      - name: Generate JavaFX boundary report
        shell: bash
        run: |
          {
            echo '# JavaFX boundary inventory'
            echo
            echo '## Core Java files importing or referencing JavaFX'
            grep -RIlE '(^|[[:space:]])import[[:space:]]+javafx\.|javafx\.' nexu-core/src/main/java --include='*.java' | sort || true
            echo
            echo '## Core UI/view Java files'
            find nexu-core/src/main/java/lu/nowina/nexu/view -type f -name '*.java' 2>/dev/null | sort || true
            echo
            echo '## Core UI resources'
            find nexu-core/src/main/resources -type f \( -name '*.fxml' -o -name '*.css' -o -name '*.png' -o -name '*.gif' \) 2>/dev/null | sort || true
            echo
            echo '## References to core UI packages from core'
            grep -RInE 'lu\.nowina\.nexu\.view\.(ui|core)' nexu-core/src/main/java --include='*.java' | sort || true
            echo
            echo '## References to core UI packages from app'
            grep -RInE 'lu\.nowina\.nexu\.view\.(ui|core)' nexu-app/src/main/java --include='*.java' | sort || true
            echo
            echo '## JavaFX dependencies in core POM'
            grep -n -B2 -A4 'javafx-' nexu-core/pom.xml || true
          } > javafx-boundary-inventory.md

      - name: Restore normal workflow and publish report
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout HEAD^ -- .github/workflows/spring-boot-modernization.yml
          git add .github/workflows/spring-boot-modernization.yml javafx-boundary-inventory.md
          git commit -m 'Record JavaFX boundary inventory'
          git push origin HEAD:spring-boot-modernization-2
