name: Spring Boot modernization

on:
  push:
    branches:
      - spring-boot-modernization-2
  pull_request:
    paths:
      - 'pom.xml'
      - 'pom-modernization.xml'
      - 'nexu-api/**'
      - 'nexu-model/**'
      - 'nexu-core/**'
      - 'nexu-standalone/**'
      - 'nexu-rest-plugin/**'
      - 'nexu-app/**'
      - 'nexu-spring-boot-server/**'
      - 'nexu-modern-app/**'
      - '.github/workflows/spring-boot-modernization.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-modern-application:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Package source snapshot
        shell: bash
        run: |
          git ls-files -z -- \
            '*.java' '*.xml' '*.properties' '*.yml' '*.yaml' \
            '*.md' '*.js' '*.fxml' '*.css' '*.iss' '*.bat' '*.sh' \
            | tar --null --files-from=- -czf source-snapshot.tar.gz

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: nexu-source-snapshot
          path: source-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Set up Java 11 and Java 17 toolchains
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            11
            17
          mvn-toolchain-id: |
            temurin_11
            temurin_17
          cache: maven

      - name: Show Java and Maven toolchains
        shell: bash
        run: |
          java -version
          mvn --version
          cat "$HOME/.m2/toolchains.xml"

      - name: Install legacy parent POM
        shell: bash
        run: |
          mvn --batch-mode --errors \
            -N \
            -f pom.xml \
            -Dmaven.test.skip=true \
            install > maven-parent-install.log 2>&1

      - name: Build executable modern application
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors \
            -f pom-modernization.xml \
            -pl nexu-modern-app \
            -am \
            -Dnexu.app.shade.phase=none \
            -Dmaven.test.skip=true \
            install > maven-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Maven reactor build failed with exit code $status"
            tail -n 160 maven-build.log
          fi
          exit "$status"

      - name: Test Spring Boot adapter
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors \
            -f pom-modernization.xml \
            -pl nexu-spring-boot-server \
            test > maven-test.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Spring Boot adapter tests failed with exit code $status"
            tail -n 160 maven-test.log
          fi
          exit "$status"

      - name: Verify executable JAR
        shell: bash
        run: |
          JAR=nexu-modern-app/target/nexu-modern.jar
          test -f "$JAR"
          unzip -p "$JAR" META-INF/MANIFEST.MF | tee nexu-modern-manifest.txt
          grep -q 'Start-Class: lu.nowina.nexu.NexuLauncher' nexu-modern-manifest.txt
          jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-spring-boot-server-'
          jar tf "$JAR" | grep -q 'BOOT-INF/classes/nexu-config.properties'

      - name: Record application dependency graph
        shell: bash
        run: |
          mvn --batch-mode \
            -f pom-modernization.xml \
            -pl nexu-modern-app \
            dependency:tree > maven-dependency-tree.log 2>&1

      - name: Upload executable application
        uses: actions/upload-artifact@v4
        with:
          name: nexu-modern-application
          path: nexu-modern-app/target/nexu-modern.jar
          if-no-files-found: error
          retention-days: 7

      - name: Upload Maven logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-maven-logs
          path: |
            maven-parent-install.log
            maven-build.log
            maven-test.log
            maven-dependency-tree.log
            nexu-modern-manifest.txt
          if-no-files-found: warn
          retention-days: 7
