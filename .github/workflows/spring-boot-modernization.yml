name: Make NexU core headless

on:
  push:
    branches:
      - spring-boot-modernization-2
    paths:
      - '.github/workflows/spring-boot-modernization.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out modernization branch
        uses: actions/checkout@v4
        with:
          ref: spring-boot-modernization-2
          fetch-depth: 2

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Move JavaFX implementation to nexu-app
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import xml.etree.ElementTree as ET

          root = Path('.')

          def merge_tree(source: Path, target: Path) -> None:
              if not source.exists():
                  return
              for item in sorted(source.rglob('*')):
                  if not item.is_file():
                      continue
                  relative = item.relative_to(source)
                  destination = target / relative
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  if destination.exists():
                      if destination.read_bytes() != item.read_bytes():
                          raise RuntimeError(f'Conflicting UI file: {item} -> {destination}')
                      item.unlink()
                  else:
                      shutil.move(str(item), str(destination))
              shutil.rmtree(source, ignore_errors=True)

          merge_tree(
              root / 'nexu-core/src/main/java/lu/nowina/nexu/view/ui',
              root / 'nexu-app/src/main/java/lu/nowina/nexu/view/ui')
          merge_tree(
              root / 'nexu-core/src/main/resources/fxml',
              root / 'nexu-app/src/main/resources/fxml')
          merge_tree(
              root / 'nexu-core/src/main/resources/images',
              root / 'nexu-app/src/main/resources/images')

          ui_operation = root / 'nexu-core/src/main/java/lu/nowina/nexu/view/core/UIOperation.java'
          ui_operation.write_text('''/**
           * © Nowina Solutions, 2015-2015
           *
           * Licensed under the European Union Public Licence (EUPL).
           */
          package lu.nowina.nexu.view.core;

          import java.util.Arrays;

          import org.slf4j.Logger;
          import org.slf4j.LoggerFactory;

          import lu.nowina.nexu.api.flow.AbstractFutureOperationInvocation;
          import lu.nowina.nexu.api.flow.BasicOperationStatus;
          import lu.nowina.nexu.api.flow.FutureOperationInvocation;
          import lu.nowina.nexu.api.flow.OperationResult;
          import lu.nowina.nexu.api.flow.OperationStatus;
          import lu.nowina.nexu.flow.Flow;
          import lu.nowina.nexu.flow.operation.UIDisplayAwareOperation;

          /**
           * Headless description of a user interaction requested by a {@link Flow}.
           *
           * <p>The core stores the view resource and controller parameters but does not
           * load JavaFX classes. A {@link UIDisplay} implementation in {@code nexu-app}
           * renders the operation and signals its completion.</p>
           *
           * @param <R> operation result type
           */
          public class UIOperation<R> implements UIDisplayAwareOperation<R> {

              private static final Logger LOGGER = LoggerFactory.getLogger(UIOperation.class);

              private transient Object lock = new Object();
              private transient volatile OperationResult<R> result;

              private UIDisplay display;
              private String viewResource;
              private Object[] controllerParams;

              public UIOperation() {
                  // Required by the operation factory.
              }

              public void setParams(final Object... params) {
                  if (params == null || params.length < 1) {
                      throw new IllegalArgumentException("A UIOperation needs a view resource.");
                  }
                  try {
                      this.viewResource = (String) params[0];
                      if (params.length > 1) {
                          if (params[1] instanceof Object[]) {
                              this.controllerParams = Arrays.copyOf((Object[]) params[1], ((Object[]) params[1]).length);
                          } else {
                              this.controllerParams = Arrays.copyOfRange(params, 1, params.length);
                          }
                      } else {
                          this.controllerParams = new Object[0];
                      }
                  } catch (ClassCastException exception) {
                      throw new IllegalArgumentException("Expected parameters: view resource, controller parameters.", exception);
                  }
              }

              public final String getViewResource() {
                  return viewResource;
              }

              public final Object[] getControllerParams() {
                  return controllerParams == null
                          ? new Object[0]
                          : Arrays.copyOf(controllerParams, controllerParams.length);
              }

              @Override
              public final OperationResult<R> perform() {
                  LOGGER.info("Displaying {}", viewResource);
                  display();
                  return result;
              }

              public final void waitEnd() throws InterruptedException {
                  final String operationName = getOperationName();
                  LOGGER.info("Thread {} waits on {}", Thread.currentThread().getName(), operationName);
                  synchronized (lock) {
                      while (result == null) {
                          lock.wait();
                      }
                  }
                  LOGGER.info("Thread {} resumed on {}", Thread.currentThread().getName(), operationName);
              }

              public final void signalEnd(final R value) {
                  notifyResult(new OperationResult<>(value));
                  hide();
              }

              public final void signalEnd(final OperationStatus operationStatus) {
                  notifyResult(new OperationResult<>(operationStatus));
              }

              public final void signalUserCancel() {
                  notifyResult(new OperationResult<>(BasicOperationStatus.USER_CANCEL));
              }

              private void notifyResult(final OperationResult<R> operationResult) {
                  this.result = operationResult;
                  synchronized (lock) {
                      lock.notifyAll();
                  }
              }

              private String getOperationName() {
                  return viewResource == null ? getClass().getSimpleName() : viewResource;
              }

              @Override
              public final void setDisplay(final UIDisplay display) {
                  this.display = display;
              }

              protected final UIDisplay getDisplay() {
                  return display;
              }

              protected void display() {
                  display.displayAndWaitUIOperation(this);
              }

              protected void hide() {
                  display.close(true);
              }

              @Override
              public int hashCode() {
                  int value = 17;
                  value = 31 * value + (display == null ? 0 : display.hashCode());
                  value = 31 * value + (viewResource == null ? 0 : viewResource.hashCode());
                  value = 31 * value + Arrays.hashCode(controllerParams);
                  return value;
              }

              @Override
              public boolean equals(final Object otherObject) {
                  if (this == otherObject) {
                      return true;
                  }
                  if (otherObject == null || getClass() != otherObject.getClass()) {
                      return false;
                  }
                  final UIOperation<?> other = (UIOperation<?>) otherObject;
                  return java.util.Objects.equals(display, other.display)
                          && java.util.Objects.equals(viewResource, other.viewResource)
                          && Arrays.equals(controllerParams, other.controllerParams);
              }

              public static <R, T extends UIOperation<R>> FutureOperationInvocation<R> getFutureOperationInvocation(
                      final Class<T> operationClass,
                      final String viewResource,
                      final Object... controllerParams) {
                  return new UIFutureOperationInvocation<>(operationClass, viewResource, controllerParams);
              }

              private static final class UIFutureOperationInvocation<R, T extends UIOperation<R>>
                      extends AbstractFutureOperationInvocation<R> {

                  private final Class<T> operationClass;
                  private final String viewResource;
                  private final Object[] controllerParams;

                  private UIFutureOperationInvocation(
                          final Class<T> operationClass,
                          final String viewResource,
                          final Object... controllerParams) {
                      this.operationClass = operationClass;
                      this.viewResource = viewResource;
                      this.controllerParams = controllerParams == null
                              ? new Object[0]
                              : Arrays.copyOf(controllerParams, controllerParams.length);
                  }

                  @Override
                  protected Class<T> getOperationClass() {
                      return operationClass;
                  }

                  @Override
                  protected Object[] getOperationParams() {
                      return new Object[] {viewResource, Arrays.copyOf(controllerParams, controllerParams.length)};
                  }
              }
          }
          '''.replace('          ', ''), encoding='utf-8')

          display_file = root / 'nexu-app/src/main/java/lu/nowina/nexu/StandaloneUIDisplay.java'
          text = display_file.read_text(encoding='utf-8')
          text = text.replace('import java.io.File;\n', 'import java.io.File;\nimport java.io.IOException;\n')
          text = text.replace('import javafx.application.Platform;\n', 'import javafx.application.Platform;\nimport javafx.fxml.FXMLLoader;\n')
          text = text.replace('import lu.nowina.nexu.view.core.UIOperation;\n',
                              'import lu.nowina.nexu.view.core.UIOperation;\nimport lu.nowina.nexu.view.core.UIOperationController;\n')
          old_block = '''\tpublic <T> void displayAndWaitUIOperation(final UIOperation<T> operation) {
          \t\tdisplay(operation.getRoot(), true);
          \t\twaitForUser(operation);
          \t}
          '''
          new_block = '''\t@Override
          \tpublic <T> void displayAndWaitUIOperation(final UIOperation<T> operation) {
          \t\tdisplay(loadView(operation), true);
          \t\twaitForUser(operation);
          \t}

          \tprivate <T> Parent loadView(final UIOperation<T> operation) {
          \t\tfinal FXMLLoader loader = new FXMLLoader();
          \t\tloader.setResources(ResourceBundle.getBundle("bundles/nexu"));
          \t\ttry {
          \t\t\tloader.load(getClass().getResourceAsStream(operation.getViewResource()));
          \t\t} catch (IOException exception) {
          \t\t\tthrow new IllegalStateException("Cannot load UI resource " + operation.getViewResource(), exception);
          \t\t}

          \t\t@SuppressWarnings("unchecked")
          \t\tfinal UIOperationController<T> controller = loader.getController();
          \t\tif (controller == null) {
          \t\t\tthrow new IllegalStateException("No controller declared for " + operation.getViewResource());
          \t\t}
          \t\tcontroller.init(operation.getControllerParams());
          \t\tcontroller.setUIOperation(operation);
          \t\tcontroller.setDisplay(this);
          \t\treturn loader.getRoot();
          \t}
          '''
          old_block = old_block.replace('          ', '')
          new_block = new_block.replace('          ', '')
          if old_block not in text:
              raise RuntimeError('displayAndWaitUIOperation block not found')
          text = text.replace(old_block, new_block)
          old_nonblocking = '''\t@Override
          \tpublic void display(NonBlockingUIOperation operation) {
          \t\tdisplay(operation.getRoot(), false);
          \t}
          '''.replace('          ', '')
          new_nonblocking = '''\t@Override
          \tpublic void display(final NonBlockingUIOperation operation) {
          \t\tdisplay(loadView(operation), false);
          \t}
          '''.replace('          ', '')
          if old_nonblocking not in text:
              raise RuntimeError('non-blocking display block not found')
          display_file.write_text(text.replace(old_nonblocking, new_nonblocking), encoding='utf-8')

          pom = root / 'nexu-core/pom.xml'
          namespace = {'m': 'http://maven.apache.org/POM/4.0.0'}
          ET.register_namespace('', namespace['m'])
          ET.register_namespace('xsi', 'http://www.w3.org/2001/XMLSchema-instance')
          tree = ET.parse(pom)
          project = tree.getroot()
          dependencies = project.find('m:dependencies', namespace)
          for dependency in list(dependencies.findall('m:dependency', namespace)):
              group = dependency.find('m:groupId', namespace)
              if group is not None and group.text == 'org.openjfx':
                  dependencies.remove(dependency)
          ET.indent(tree, space='    ')
          tree.write(pom, encoding='UTF-8', xml_declaration=True)

          readme = root / 'README.md'
          readme_text = readme.read_text(encoding='utf-8')
          readme_text = readme_text.replace(
              '**`nexu-core`** — API, models, utilities, DSS signing, PC/SC, PKCS#11 and Windows keystore support;',
              '**`nexu-core`** — headless API, models, utilities, DSS signing, PC/SC, PKCS#11 and Windows keystore support;')
          readme.write_text(readme_text, encoding='utf-8')

          adr = root / 'docs/adr/0001-module-consolidation-and-web-eid-flow.md'
          adr_text = adr.read_text(encoding='utf-8')
          adr_text = adr_text.replace(
              '   - no Spring Boot server lifecycle or native packaging responsibilities.',
              '   - no Spring Boot, JavaFX, desktop lifecycle or native packaging dependencies.')
          adr_text = adr_text.replace(
              'During migration, the old source directories are added as source roots to one\n'
              'of the two modules. Their POM files are removed immediately. Physical source\n'
              'moves follow incrementally and must not recreate Maven modules.',
              'The historical source directories have been physically consolidated into the two\n'
              'modules. `nexu-core` contains only headless contracts and signing/card logic; all\n'
              'JavaFX controllers, FXML and desktop resources live in `nexu-app`.')
          adr_text = adr_text.replace(
              'The current JavaFX 11.0.2 baseline is obsolete. After the remaining Java 11\n'
              'modules are moved to the Java 17+ toolchain, JavaFX will be upgraded to the\n'
              'maintained JavaFX 21 line and packaged with `jlink`/`jpackage`.',
              'The operator application uses JavaFX 21 on the Java 17 toolchain and packages it\n'
              'with `jlink`/`jpackage`. The core dependency graph is explicitly JavaFX-free.')
          adr.write_text(adr_text, encoding='utf-8')

          (root / 'javafx-boundary-inventory.md').unlink(missing_ok=True)
          PY
          echo $? > migration-status.txt
          exit 0

      - name: Build and verify the headless boundary
        shell: bash
        run: |
          if [ "$(cat migration-status.txt)" != "0" ]; then
            echo 99 > build-status.txt
            exit 0
          fi
          set +e
          {
            echo '=== JavaFX source check ==='
            if grep -RInE '(^|[[:space:]])import[[:space:]]+javafx\.|javafx\.' nexu-core/src/main/java --include='*.java'; then
              echo 'JavaFX reference remains in nexu-core'
              exit 41
            fi
            echo '=== Maven build ==='
            mvn --batch-mode --errors clean package
            echo '=== Core dependency check ==='
            mvn --batch-mode -pl nexu-core dependency:tree -Dincludes=org.openjfx:*
            if mvn --batch-mode -pl nexu-core dependency:tree -Dincludes=org.openjfx:* | grep -q 'org.openjfx'; then
              echo 'OpenJFX dependency remains in nexu-core'
              exit 42
            fi
            test -f nexu-app/target/nexu-app.jar
            jar tf nexu-app/target/nexu-app.jar | grep -q 'BOOT-INF/lib/nexu-core-'
            jar tf nexu-app/target/nexu-app.jar | grep -q 'BOOT-INF/lib/javafx-controls-21.0.11-linux.jar'
          } > headless-core-build.log 2>&1
          status=$?
          echo "$status" > build-status.txt
          exit 0

      - name: Publish successful cleanup or diagnostic
        if: always()
        shell: bash
        run: |
          migration_status=$(cat migration-status.txt 2>/dev/null || echo 98)
          build_status=$(cat build-status.txt 2>/dev/null || echo 97)
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if [ "$migration_status" = "0" ] && [ "$build_status" = "0" ]; then
            git checkout HEAD^ -- .github/workflows/spring-boot-modernization.yml
            rm -f migration-status.txt build-status.txt headless-core-build.log
            git add -A
            git commit -m 'Make nexu-core independent of JavaFX'
          else
            {
              echo '# Headless core migration failure'
              echo
              echo "migration_status=$migration_status"
              echo "build_status=$build_status"
              echo
              echo '```text'
              tail -n 260 headless-core-build.log 2>/dev/null || true
              echo '```'
            } > /tmp/headless-core-migration-error.md
            git reset --hard HEAD
            git checkout HEAD^ -- .github/workflows/spring-boot-modernization.yml
            cp /tmp/headless-core-migration-error.md headless-core-migration-error.md
            git add .github/workflows/spring-boot-modernization.yml headless-core-migration-error.md
            git commit -m 'Record headless core migration failure'
          fi
          git push origin HEAD:spring-boot-modernization-2
