name: Build NexU

on:
  push:
    branches:
      - spring-boot-modernization-2
  pull_request:
    paths:
      - 'pom.xml'
      - 'nexu-core/**'
      - 'nexu-app/**'
      - 'nexu-api/**'
      - 'nexu-model/**'
      - 'nexu-util/**'
      - 'nexu-standalone/**'
      - 'nexu-spring-boot-server/**'
      - 'nexu-windows-keystore-plugin/**'
      - '.github/workflows/spring-boot-modernization.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-application:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn --version

      - name: Compile consolidated reactor
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors clean install \
            -Dmaven.test.skip=true > maven-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 220 maven-build.log
          fi
          exit "$status"

      - name: Test modern application protocol
        shell: bash
        run: |
          set +e
          # nexu-core is already installed by the preceding step. Running only
          # nexu-app tests avoids reactivating legacy DSS 5-era core tests while
          # still executing the aggregated Spring Boot protocol test suite.
          mvn --batch-mode --errors \
            -pl nexu-app test > maven-test.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 220 maven-test.log
          fi
          exit "$status"

      - name: Verify two-module executable JAR
        shell: bash
        run: |
          JAR=nexu-app/target/nexu-app.jar
          test -f "$JAR"
          unzip -p "$JAR" META-INF/MANIFEST.MF | tee nexu-app-manifest.txt
          grep -q 'Start-Class: lu.nowina.nexu.NexuLauncher' nexu-app-manifest.txt
          jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-core-'
          jar tf "$JAR" | grep -q 'BOOT-INF/classes/nexu-config.properties'
          jar tf "$JAR" | grep -q 'BOOT-INF/lib/javafx-graphics-21.0.11-linux.jar'
          jar tf "$JAR" | grep -q 'BOOT-INF/lib/javafx-controls-21.0.11-linux.jar'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-api-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-model-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-util-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-standalone-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-spring-boot-server-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/nexu-windows-keystore-plugin-'
          ! jar tf "$JAR" | grep -q 'BOOT-INF/lib/javafx-.*-11.0.2'

      - name: Record dependency graph
        run: |
          mvn --batch-mode -pl nexu-app dependency:tree \
            > maven-dependency-tree.log 2>&1

      - name: Upload executable application
        uses: actions/upload-artifact@v4
        with:
          name: nexu-application
          path: nexu-app/target/nexu-app.jar
          if-no-files-found: error
          retention-days: 7

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexu-build-logs
          path: |
            maven-build.log
            maven-test.log
            maven-dependency-tree.log
            nexu-app-manifest.txt
          if-no-files-found: warn
          retention-days: 7
