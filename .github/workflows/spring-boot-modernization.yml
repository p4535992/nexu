name: Consolidate NexU sources

on:
  push:
    branches:
      - spring-boot-modernization-2
    paths:
      - '.github/workflows/spring-boot-modernization.yml'

concurrency:
  group: nexu-physical-source-cleanup
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Check out modernization branch
        uses: actions/checkout@v4
        with:
          ref: spring-boot-modernization-2
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Consolidate physical source tree
        id: migrate
        shell: bash
        run: |
          set +e
          python3 scripts/consolidate_sources.py > physical-cleanup-migration.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat physical-cleanup-migration.log
          exit 0

      - name: Build and test cleaned repository
        id: build
        if: steps.migrate.outputs.status == '0'
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors clean package > physical-cleanup-build.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            test -f nexu-app/target/nexu-app.jar || status=20
            test ! -d nexu-api || status=21
            test ! -d nexu-model || status=22
            test ! -d nexu-util || status=23
            test ! -d nexu-standalone || status=24
            test ! -d nexu-spring-boot-server || status=25
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 240 physical-cleanup-build.log
          exit 0

      - name: Publish cleanup result
        if: always()
        shell: bash
        run: |
          migration_status='${{ steps.migrate.outputs.status }}'
          build_status='${{ steps.build.outputs.status }}'
          success=false
          if [ "$migration_status" = '0' ] && [ "$build_status" = '0' ]; then
            success=true
          fi

          cp physical-cleanup-migration.log /tmp/physical-cleanup-migration.log 2>/dev/null || true
          cp physical-cleanup-build.log /tmp/physical-cleanup-build.log 2>/dev/null || true

          if [ "$success" != true ]; then
            git reset --hard HEAD
          fi

          git show origin/master:.github/workflows/spring-boot-modernization.yml \
            > .github/workflows/spring-boot-modernization.yml
          rm -f .github/workflows/physical-source-consolidation.yml
          rm -f scripts/consolidate_sources.py

          if [ "$success" = true ]; then
            rm -f physical-cleanup-status.txt
            commit_message='Physically consolidate sources into nexu-core and nexu-app'
          else
            {
              echo "migration_status=${migration_status:-not-run}"
              echo "build_status=${build_status:-not-run}"
              echo
              echo '=== migration log ==='
              tail -n 160 /tmp/physical-cleanup-migration.log 2>/dev/null || true
              echo
              echo '=== build log ==='
              tail -n 240 /tmp/physical-cleanup-build.log 2>/dev/null || true
            } > physical-cleanup-status.txt
            commit_message='Record failed physical source cleanup'
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          git commit -m "$commit_message"
          git push origin HEAD:spring-boot-modernization-2
