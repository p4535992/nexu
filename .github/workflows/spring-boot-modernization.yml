name: Verify cleaned NexU build

on:
  push:
    branches:
      - spring-boot-modernization-2
    paths:
      - '.github/workflows/spring-boot-modernization.yml'

concurrency:
  group: nexu-clean-parent-verification
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: spring-boot-modernization-2
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        id: build
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors clean package > clean-parent-build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 260 clean-parent-build.log
          exit 0

      - name: Record result and restore workflow
        if: always()
        shell: bash
        run: |
          status='${{ steps.build.outputs.status }}'
          git show origin/master:.github/workflows/spring-boot-modernization.yml \
            > .github/workflows/spring-boot-modernization.yml
          {
            echo "build_status=${status:-not-run}"
            echo
            echo '=== build log tail ==='
            tail -n 260 clean-parent-build.log 2>/dev/null || true
          } > cleanup-verification.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/spring-boot-modernization.yml cleanup-verification.txt
          git commit -m 'Record cleaned two-module build verification'
          git push origin HEAD:spring-boot-modernization-2
