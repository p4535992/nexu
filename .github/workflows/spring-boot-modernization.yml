name: Spring Boot modernization

on:
  push:
    branches:
      - spring-boot-modernization-2
  pull_request:
    paths:
      - 'pom.xml'
      - 'pom-modernization.xml'
      - 'nexu-api/**'
      - 'nexu-model/**'
      - 'nexu-core/**'
      - 'nexu-standalone/**'
      - 'nexu-rest-plugin/**'
      - 'nexu-spring-boot-server/**'
      - '.github/scripts/**'
      - '.github/workflows/spring-boot-modernization.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup-mocca:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out modernization branch
        uses: actions/checkout@v4
        with:
          ref: spring-boot-modernization-2
          fetch-depth: 1

      - name: Apply MOCCA cleanup
        id: cleanup
        continue-on-error: true
        shell: bash
        run: python3 .github/scripts/remove-mocca.py > mocca-cleanup.log 2>&1

      - name: Upload cleanup diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mocca-cleanup-log
          path: mocca-cleanup.log
          if-no-files-found: warn
          retention-days: 1

      - name: Verify cleanup result
        if: steps.cleanup.outcome == 'failure'
        shell: bash
        run: |
          cat mocca-cleanup.log
          exit 1

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No cleanup changes were required'
            exit 0
          fi
          git commit -m 'Remove obsolete MOCCA implementation'
          git push origin HEAD:spring-boot-modernization-2

  build-server-adapter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Package source snapshot
        shell: bash
        run: |
          git ls-files -z -- \
            '*.java' '*.xml' '*.properties' '*.yml' '*.yaml' \
            '*.md' '*.js' '*.fxml' '*.css' '*.iss' '*.bat' '*.sh' \
            | tar --null --files-from=- -czf source-snapshot.tar.gz

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: nexu-source-snapshot
          path: source-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Set up Java 11 and Java 17 toolchains
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            11
            17
          mvn-toolchain-id: |
            temurin_11
            temurin_17
          cache: maven

      - name: Show Java and Maven toolchains
        shell: bash
        run: |
          java -version
          mvn --version
          cat "$HOME/.m2/toolchains.xml"

      - name: Install legacy parent POM
        shell: bash
        run: |
          mvn --batch-mode --errors \
            -N \
            -f pom.xml \
            -Dmaven.test.skip=true \
            install > maven-parent-install.log 2>&1

      - name: Build modernization reactor
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors \
            -f pom-modernization.xml \
            -pl nexu-spring-boot-server \
            -am \
            -Dmaven.test.skip=true \
            install > maven-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Maven reactor build failed with exit code $status"
            tail -n 120 maven-build.log
          fi
          exit "$status"

      - name: Test Spring Boot adapter
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors \
            -f pom-modernization.xml \
            -pl nexu-spring-boot-server \
            test > maven-test.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Spring Boot adapter tests failed with exit code $status"
            tail -n 120 maven-test.log
          fi
          exit "$status"

      - name: Upload Maven logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-maven-logs
          path: |
            maven-parent-install.log
            maven-build.log
            maven-test.log
          if-no-files-found: warn
          retention-days: 7
