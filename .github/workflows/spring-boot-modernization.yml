name: Spring Boot modernization

on:
  push:
    branches:
      - spring-boot-modernization-2
  pull_request:
    paths:
      - 'pom-modernization.xml'
      - 'nexu-spring-boot-server/**'
      - '.github/workflows/spring-boot-modernization.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-server-adapter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Spring Boot server adapter
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors \
            -f pom-modernization.xml \
            -pl nexu-spring-boot-server \
            -am \
            -DskipTests \
            package > maven-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Maven build failed with exit code $status"
            tail -n 80 maven-build.log
          fi
          exit "$status"

      - name: Upload Maven log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-maven-log
          path: maven-build.log
          if-no-files-found: error
          retention-days: 7
