name: Spring Boot modernization

on:
  push:
    branches:
      - spring-boot-modernization-2
  pull_request:
    paths:
      - 'pom.xml'
      - 'pom-modernization.xml'
      - 'nexu-api/**'
      - 'nexu-core/**'
      - 'nexu-standalone/**'
      - 'nexu-spring-boot-server/**'
      - '.github/workflows/spring-boot-modernization.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-server-adapter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Package source snapshot
        shell: bash
        run: |
          git ls-files -z -- \
            '*.java' '*.xml' '*.properties' '*.yml' '*.yaml' \
            '*.md' '*.js' '*.fxml' '*.css' '*.iss' '*.bat' '*.sh' \
            | tar --null --files-from=- -czf source-snapshot.tar.gz

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: nexu-source-snapshot
          path: source-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Set up Java 11 and Java 17 toolchains
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            11
            17
          mvn-toolchain-id: |
            temurin_11
            temurin_17
          cache: maven

      - name: Show Java and Maven toolchains
        shell: bash
        run: |
          java -version
          mvn --version
          cat "$HOME/.m2/toolchains.xml"

      - name: Build Spring Boot server adapter
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors \
            -f pom-modernization.xml \
            -pl nexu-spring-boot-server \
            -am \
            -DskipTests \
            package > maven-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Maven build failed with exit code $status"
            tail -n 120 maven-build.log
          fi
          exit "$status"

      - name: Upload Maven log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-maven-log
          path: maven-build.log
          if-no-files-found: error
          retention-days: 7
