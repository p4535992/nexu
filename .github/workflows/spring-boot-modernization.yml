name: Spring Boot modernization

on:
  push:
    branches:
      - spring-boot-modernization-2
  pull_request:
    paths:
      - 'pom-modernization.xml'
      - 'nexu-spring-boot-server/**'
      - '.github/workflows/spring-boot-modernization.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-server-adapter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Spring Boot server adapter
        run: >-
          mvn --batch-mode --errors
          -f pom-modernization.xml
          -pl nexu-spring-boot-server
          -am
          -DskipTests
          package
