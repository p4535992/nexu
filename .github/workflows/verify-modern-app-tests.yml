name: Verify modern app tests

on:
  push:
    branches:
      - spring-boot-modernization-2
    paths:
      - '.github/workflows/verify-modern-app-tests.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: spring-boot-modernization-2
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build consolidated modules
        id: build
        shell: bash
        run: |
          set +e
          mvn --batch-mode --errors clean install -Dmaven.test.skip=true > two-module-build.log 2>&1
          build_status=$?
          test_status=99
          if [ "$build_status" -eq 0 ]; then
            mvn --batch-mode --errors -pl nexu-app test > two-module-test.log 2>&1
            test_status=$?
          else
            echo 'Tests not run because compilation failed.' > two-module-test.log
          fi
          {
            echo "build_status=$build_status"
            echo "test_status=$test_status"
            echo
            echo '=== build log tail ==='
            tail -n 180 two-module-build.log
            echo
            echo '=== test log tail ==='
            tail -n 260 two-module-test.log
          } > docs/ci/two-module-verification.txt
          echo "build_status=$build_status" >> "$GITHUB_OUTPUT"
          echo "test_status=$test_status" >> "$GITHUB_OUTPUT"
      - name: Persist result and remove one-time workflow
        if: always()
        run: |
          rm .github/workflows/verify-modern-app-tests.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A docs/ci/two-module-verification.txt .github/workflows/verify-modern-app-tests.yml
          git commit -m 'Record modern app test verification'
          git push origin HEAD:spring-boot-modernization-2
      - name: Fail when verification failed
        if: always()
        run: |
          test '${{ steps.build.outputs.build_status }}' = '0'
          test '${{ steps.build.outputs.test_status }}' = '0'
